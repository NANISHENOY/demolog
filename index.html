<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Login Page</title>
  <meta name="description" content=" Login to your account.">

  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="theme-color" content="#1AEBB6">

  <meta property="og:title" content="Login">
  <meta property="og:description" content="See your growth and get consulting support.">
  <meta property="og:image" content="assets/images/blazer.favicon.png">
  <meta property="og:type" content="website">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="icon" type="image/png" href="assets/images/blazers_favicon.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">

</head>

<body class="min-vh-100 d-flex align-items-stretch">

  <div class="container-fluid">
    <div class="row">

      <div class="col-md-6 col-12 d-flex align-items-center order-1 order-md-1">
        <div class="container-fluid w-75">
          <p class="welcome-text">Welcome,</p>
          <p class="sub-text">See your growth and get consulting support</p>

          <!-- Google Button with Official Logo -->
          <button class="google-btn">
            <img src="https://developers.google.com/identity/images/g-logo.png" alt="Google Logo">
            Sign in with Google
          </button>

          <div class="divider">
            <hr>
            <span>Or</span>
            <hr>
          </div>

          <label class="form-label-custom">Email</label>
          <input type="email" class="form-control custom-input" placeholder="mail@gmail.com">

          <label class="form-label-custom">Password</label>
          <div class="position-relative mb-3">
            <input id="password" type="password" class="form-control custom-input pe-5" placeholder="min. 8 characters">
            <i class="fa fa-eye position-absolute top-50 end-0 translate-middle-y me-3" id="togglePassword" 
              style="color: #828181; cursor: pointer;">
            </i>
          </div>

          <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="form-check mb-0">
              <input class="form-check-input" type="checkbox" id="remember">
              <label class="form-check-label">Remember me</label>
            </div>
            <span class="link-text">Forgot password?</span>
          </div>

          <button class="login-btn">Login</button>

          <p class="register-text">
            Not registered yet?
            <span>Create an account</span>
          </p>
        </div>
      </div>

      <div class="col-md-6 col-12 d-flex align-items-center justify-content-center order-2 order-md-2 p-0">
        <img src="assets/images/Group 168.png" class="w-100 login-img" alt="">
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const togglePassword = document.getElementById('togglePassword');
    const password = document.getElementById('password');

    togglePassword.addEventListener('click', () => {
      const isPassword = password.type === 'password';
      password.type = isPassword ? 'text' : 'password';
      togglePassword.classList.toggle('fa-eye');
      togglePassword.classList.toggle('fa-eye-slash');
    });
  </script>

</body>
</html>
